[build]
  base      = "frontend"
  publish   = "frontend/dist"
  command   = "npm run build"

[build.environment]
  NODE_VERSION = "18"

# ✅ Critical: redirect all routes to index.html so React Router works
# Without this, /dashboard refreshed = 404 on Netlify
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
